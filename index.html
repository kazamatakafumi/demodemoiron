const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W = 480, H = 720, DPR = 1;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const aw = window.innerWidth, ah = window.innerHeight;
  // 縦長基準 480x720、画面に合わせてフィット
  const scale = Math.min(aw / 480, ah / 720);
  W = 480; H = 720;
  cv.style.width  = (480 * scale) + "px";
  cv.style.height = (720 * scale) + "px";
  cv.width  = 480 * DPR;
  cv.height = 720 * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

// ================= サウンド (Web Audio / iOS対応) =================
let ac = null;
function audioInit(){
  if (ac) return;
  try {
    ac = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e){ ac = null; }
}
function audioUnlock(){
  audioInit();
  if (ac && ac.state === "suspended") ac.resume();
}
// 舌打ち「チッ」: 短いノイズクリック
function seTsk(pitch){
  if (!ac) return;
  const t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 3);
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter(); bp.type = "bandpass";
  bp.frequency.value = 3200 + pitch * 600; bp.Q.value = 5;
  const g = ac.createGain(); g.gain.setValueAtTime(0.5, t);
  src.connect(bp); bp.connect(g); g.connect(ac.destination);
  src.start(t);
}
// ジュッ: シューっと減衰するノイズ
function seSizzle(long){
  if (!ac) return;
  const t = ac.currentTime;
  const dur = long ? 0.5 : 0.25;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
  const src = ac.createBufferSource(); src.buffer = buf;
  const hp = ac.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 4000;
  const g = ac.createGain();
  g.gain.setValueAtTime(long ? 0.45 : 0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(hp); hp.connect(g); g.connect(ac.destination);
  src.start(t);
}
// ダメージ: 低い「ぼよん」
function seHurt(){
  if (!ac) return;
  const t = ac.currentTime;
  const o = ac.createOscillator(); o.type = "square";
  o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(70, t + 0.3);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t + 0.4);
}
// 逆ギレ発動ジングル
function seRage(){
  if (!ac) return;
  const t = ac.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = ac.createOscillator(); o.type = "sawtooth";
    o.frequency.value = f;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t + i*0.07);
    g.gain.exponentialRampToValueAtTime(0.2, t + i*0.07 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i*0.07 + 0.25);
    o.connect(g); g.connect(ac.destination);
    o.start(t + i*0.07); o.stop(t + i*0.07 + 0.3);
  });
}

  speed = 150; spawnTimer = 1.2; seironTimer = 7; elapsed = 0;
  enemies = []; effects = []; floaters = [];
  attackT = -1; hurtT = 0; shakeT = 0; deathBySeiron = false;
  state = "play";
}

// ================= 敵の生成 =================
function pickExcuse(){
  // 経過時間でレア度の出やすさが上がる
  const lvl = Math.min(3, Math.floor(elapsed / 20));
  const pool = EXCUSES.filter(e => e.w <= lvl);
  return pool[Math.floor(Math.random() * pool.length)];
}
function spawnEnemy(){
  const seiron = seironTimer <= 0;
  if (seiron){
    seironTimer = 6 + Math.random() * 6;
    const t = SEIRON[Math.floor(Math.random() * SEIRON.length)];
    enemies.push({ type:"seiron", t, pt:200, x: W + 80, y: GROUND_Y - 90 - Math.random()*60,
      bob: Math.random()*6.28, dead:false, deadT:0, big:false });
  } else {
    const e = pickExcuse();
    enemies.push({ type:"excuse", t:e.t, pt:e.pt, x: W + 80, y: GROUND_Y - 80 - Math.random()*70,
      bob: Math.random()*6.28, dead:false, deadT:0, big: e.pt >= 80 });
  }
}

// ================= 攻撃 =================
function doAttack(){
  if (state !== "play" || attackT >= 0 || hurtT > 0.25) return;
  attackT = 0;
  const tier = combo >= 20 ? 2 : combo >= 8 ? 1 : 0;
  seTsk(tier);
  const tskText = ["チッ", "チッチッ", "チィィッ!!"][tier];
  floaters.push({ t:tskText, x: CAT_X + CAT_W - 10, y: GROUND_Y - CAT_H - 20,
    vy:-40, life:0.6, size: 22 + tier*6, col:"#3a2530", bubble:true });

  let hitAny = false;
  for (const e of enemies){
    if (e.dead) continue;
    const ex = e.x;
    if (ex > CAT_X + CAT_W - 40 && ex < CAT_X + CAT_W + ATTACK_RANGE){
      if (e.type === "seiron" && !rage){
        // 正論を焼こうとした → 逆にダメージ
        hurt(e, true);
        e.dead = true; e.deadT = 0; e.counter = true;
        return;
      }
      burnEnemy(e);
      hitAny = true;
    }
  }
  if (hitAny) seSizzle(false);
}

function burnEnemy(e){
  e.dead = true; e.deadT = 0;
  burned++;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  const mult = rage ? 2 : 1;
  const pts = e.pt * mult;
  score += pts;
  floaters.push({ t:"ジュッ", x:e.x, y:e.y - 20, vy:-60, life:0.7, size:26, col:"#c1272d" });
  floaters.push({ t:"+"+pts, x:e.x + 20, y:e.y - 55, vy:-45, life:0.8, size:16, col:"#7a1f38" });
  // 蒸気
  for (let i = 0; i < 6; i++){
    effects.push({ kind:"steam", x:e.x + (Math.random()*40-20), y:e.y + (Math.random()*20-10),
      vx:(Math.random()*40-20), vy:-60 - Math.random()*60, r:6 + Math.random()*10, life:0.8 });
  }
  if (!rage){
    rageGauge = Math.min(RAGE_NEED, rageGauge + 1);
    if (rageGauge >= RAGE_NEED) startRage();
  }
}

function startRage(){
  rage = true; rageLeft = RAGE_TIME; rageGauge = RAGE_NEED;
  seRage(); seSizzle(true);
  shakeT = 0.4;
  floaters.push({ t:"逆ギレモード!!", x: W/2 - 90, y: H/2 - 120, vy:-20, life:1.4, size:34, col:"#ffffff", stroke:"#c1272d" });
}

function hurt(e, bySeiron){
  hp--;
  combo = 0;
  rageGauge = Math.max(0, rageGauge - 3);
  hurtT = 0.9; shakeT = 0.35;
  seHurt();
  floaters.push({ t: bySeiron ? "正論はきかない!!" : "言い訳が貼りついた!",
    x: CAT_X + 20, y: GROUND_Y - CAT_H - 40, vy:-30, life:1.0, size:18, col:"#7a1f38" });
  if (hp <= 0){
    deathBySeiron = !!bySeiron;
    gameOver();
  }
}

function gameOver(){
  state = "over";
  if (score > bestScore) bestScore = score;
}

// ================= 更新 =================
function update(dt){
  if (state !== "play") return;
  elapsed += dt;
  walkT += dt;
  bgOffset = (bgOffset + speed * dt) % 120;
  if (shakeT > 0) shakeT -= dt;
  if (hurtT > 0) hurtT -= dt;

  // だんだん速く・スポーン間隔短く
  speed = 150 + Math.min(200, elapsed * 6) + (rage ? 90 : 0);

  spawnTimer -= dt;
  seironTimer -= dt;
  if (spawnTimer <= 0){
    spawnEnemy();
    const base = Math.max(0.55, 1.4 - elapsed * 0.015);
    spawnTimer = base + Math.random() * base * 0.7;
  }

  if (attackT >= 0){
    attackT += dt;
    if (attackT > 0.22) attackT = -1;
  }

  if (rage){
    rageLeft -= dt;
    rageGauge = RAGE_NEED * Math.max(0, rageLeft / RAGE_TIME);
    if (rageLeft <= 0){ rage = false; rageGauge = 0; }
  }

  // 敵の移動
  for (const e of enemies){
    if (e.dead){ e.deadT += dt; continue; }
    e.x -= speed * dt * (e.type === "seiron" ? 0.85 : 1);
    e.bob += dt * 3;

    // 逆ギレ中は触れただけで焼却
    if (rage && e.x < CAT_X + CAT_W + 30 && e.x > CAT_X - 20){
      burnEnemy(e);
      seSizzle(false);
      continue;
    }
    // 猫に到達
    if (e.x < CAT_X + CAT_W - 55){
      if (e.type === "seiron"){
        // 正論はスルーすれば無害(通り過ぎる)
        if (e.x < -80){ /* 後で除去 */ }
      } else if (hurtT <= 0){
        e.dead = true; e.deadT = 0; e.stuck = true;
        hurt(e, false);
      }
    }
  }
  enemies = enemies.filter(e => (!e.dead && e.x > -120) || (e.dead && e.deadT < 0.6));

  // エフェクト
  for (const p of effects){
    p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.r += 8 * dt;
  }
  effects = effects.filter(p => p.life > 0);
  for (const f of floaters){
    f.life -= dt; f.y += f.vy * dt;
  }
  floaters = floaters.filter(f => f.life > 0);
}

// ================= 描画 =================
function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawBubbleEnemy(e){
  const bobY = Math.sin(e.bob) * 6;
  const isS = e.type === "seiron";
  ctx.save();
  ctx.translate(e.x, e.y + bobY);

  let squishX = 1, squishY = 1, alpha = 1;
  if (e.dead){
    // シワが伸びるようにペチャンコになって消える
    const k = Math.min(1, e.deadT / 0.45);
    squishY = 1 - k * 0.92;
    squishX = 1 + k * 0.5;
    alpha = 1 - k;
  }
  ctx.globalAlpha = alpha;
  ctx.scale(squishX, squishY);

  ctx.font = (e.big ? "bold 20px" : "bold 17px") + ' "Hiragino Maru Gothic ProN",sans-serif';
  const tw = ctx.measureText(e.t).width;
  const pw = tw + 34, ph = e.big ? 56 : 46;

  if (isS){
    // 正論: 白地・角ばった真面目な吹き出し
    ctx.fillStyle = "#f7f4ee";
    ctx.strokeStyle = "#4a5a78"; ctx.lineWidth = 3;
    roundRect(-pw/2, -ph/2, pw, ph, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#4a5a78";
    ctx.font = 'bold 11px "Hiragino Maru Gothic ProN",sans-serif';
    ctx.fillText("正 論", -pw/2 + 6, -ph/2 - 6);
    ctx.font = 'bold 17px "Hiragino Maru Gothic ProN",sans-serif';
    ctx.fillStyle = "#33415c";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(e.t, 0, 1);
  } else {
    // 言い訳: モコモコ吹き出しモンスター
    ctx.fillStyle = e.big ? "#fbe8ee" : "#fdf3f5";
    ctx.strokeStyle = "#3a2530"; ctx.lineWidth = 3;
    const bumps = 8, rx = pw/2, ry = ph/2 + 6;
    ctx.beginPath();
    for (let i = 0; i <= bumps * 2; i++){
      const a = (i / (bumps*2)) * Math.PI * 2;
      const rr = 1 + (i % 2 === 0 ? 0.12 : 0);
      const px = Math.cos(a) * rx * rr, py = Math.sin(a) * ry * rr;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // ジト目
    ctx.fillStyle = "#3a2530";
    ctx.fillRect(-14, -ph/2 + 8, 9, 3.5);
    ctx.fillRect(6, -ph/2 + 8, 9, 3.5);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#5a2233";
    ctx.fillText(e.t, 0, 6);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

function drawCat(){
  const attacking = attackT >= 0;
  const img = (attacking || Math.floor(walkT * 8) % 2 === 0) ? imgWalk : imgStand;
  const lungeX = attacking ? Math.sin(Math.min(1, attackT / 0.22) * Math.PI) * 26 : 0;
  const flash = hurtT > 0 && Math.floor(hurtT * 12) % 2 === 0;

  ctx.save();
  if (flash) ctx.globalAlpha = 0.45;
  const tilt = attacking ? 0.12 : Math.sin(walkT * 8) * 0.02;
  ctx.translate(CAT_X + CAT_W/2 + lungeX, GROUND_Y - CAT_H/2);
  ctx.rotate(tilt);
  if (img.complete && img.naturalWidth > 0){
    ctx.drawImage(img, -CAT_W/2, -CAT_H/2, CAT_W, CAT_H);
  }
  ctx.restore();
  ctx.globalAlpha = 1;

  // 攻撃時: 前方にスチーム噴射
  if (attacking){
    const k = attackT / 0.22;
    const bx = CAT_X + CAT_W + lungeX - 10;
    const by = GROUND_Y - CAT_H + 45;
    ctx.save();
    ctx.globalAlpha = (1 - k) * 0.85;
    ctx.fillStyle = "#ffffff";
    for (let i = 0; i < 5; i++){
      const px = bx + k * (30 + i * 30);
      const py = by + Math.sin(i * 2 + attackT * 40) * 12;
      ctx.beginPath();
      ctx.arc(px, py, 10 + i * 4 * k, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  // 逆ギレ中: 常時スチーム&オーラ
  if (rage && Math.random() < 0.5){
    effects.push({ kind:"steam", x: CAT_X + 40 + Math.random()*60, y: GROUND_Y - CAT_H + 10,
      vx: -20 - Math.random()*30, vy: -50 - Math.random()*50, r: 5 + Math.random()*8, life: 0.7 });
  }
}

function drawBG(){
  // 空
  ctx.fillStyle = rage ? "#e0526f" : "#de7f90";
  ctx.fillRect(0, 0, W, H);
  if (rage){
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    for (let i = 0; i < 6; i++){
      ctx.fillRect(0, (i * 130 + elapsed * 400) % (H + 100) - 100, W, 30);
    }
  }
  // 遠景: クシャクシャの布の山(通過後はアイロンがけ済みでツルンとする…の雰囲気)
  ctx.strokeStyle = "rgba(120,45,70,0.25)";
  ctx.lineWidth = 2;
  for (let i = -1; i < 6; i++){
    const x = i * 120 - bgOffset * 0.5 % 120;
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y - 40);
    ctx.quadraticCurveTo(x + 30, GROUND_Y - 95 - (i%2)*25, x + 60, GROUND_Y - 40);
    ctx.stroke();
  }
  // 地面 = アイロン台
  ctx.fillStyle = rage ? "#b23350" : "#c96a80";
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  // 布のシワ(スクロール)
  ctx.strokeStyle = "rgba(90,30,50,0.3)";
  ctx.lineWidth = 2;
  for (let i = -1; i < 6; i++){
    const x = i * 120 - bgOffset;
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 25);
    ctx.quadraticCurveTo(x + 30, GROUND_Y + 45, x + 60, GROUND_Y + 25);
    ctx.quadraticCurveTo(x + 90, GROUND_Y + 8, x + 120, GROUND_Y + 25);
    ctx.stroke();
  }
}

function drawSteam(){
  for (const p of effects){
    ctx.globalAlpha = Math.max(0, p.life) * 0.8;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFloaters(){
  for (const f of floaters){
    ctx.save();
    ctx.globalAlpha = Math.min(1, f.life * 2);
    ctx.font = "bold " + f.size + 'px "Hiragino Maru Gothic ProN",sans-serif';
    if (f.bubble){
      const tw = ctx.measureText(f.t).width;
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "#3a2530"; ctx.lineWidth = 2.5;
      roundRect(f.x - 10, f.y - f.size, tw + 20, f.size + 14, 12);
      ctx.fill(); ctx.stroke();
    }
    if (f.stroke){
      ctx.lineWidth = 6; ctx.strokeStyle = f.stroke;
      ctx.strokeText(f.t, f.x, f.y);
    }
    ctx.fillStyle = f.col;
    ctx.fillText(f.t, f.x, f.y);
    ctx.restore();
  }
}

function drawHUD(){
  // スコア
  ctx.fillStyle = "#3a2530";
  ctx.font = 'bold 26px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillText(score + " pt", 18, 42);
  ctx.font = 'bold 14px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillText("焼いた言い訳 " + burned + "枚", 18, 64);

  // HP(アイロン型…は大変なので絆創膏ハート)
  for (let i = 0; i < 3; i++){
    const x = W - 40 - i * 36, y = 34;
    ctx.font = "24px sans-serif";
    ctx.globalAlpha = i < hp ? 1 : 0.22;
    ctx.fillText("🩹", x - 12, y + 8);
    ctx.globalAlpha = 1;
  }

  // コンボ
  if (combo >= 2){
    ctx.fillStyle = "#7a1f38";
    ctx.font = 'bold 20px "Hiragino Maru Gothic ProN",sans-serif';
    ctx.fillText(combo + " COMBO", 18, 92);
  }

  // 逆ギレゲージ
  const gw = 200, gx = W/2 - gw/2, gy = 70;
  ctx.fillStyle = "rgba(255,255,255,0.4)";
  roundRect(gx, gy, gw, 14, 7); ctx.fill();
  const ratio = rageGauge / RAGE_NEED;
  if (ratio > 0){
    ctx.fillStyle = rage ? "#fff" : "#c1272d";
    roundRect(gx, gy, gw * ratio, 14, 7); ctx.fill();
  }
  ctx.fillStyle = "#3a2530";
  ctx.font = 'bold 11px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.textAlign = "center";
  ctx.fillText(rage ? "逆ギレ中!! 正論も焼ける!!" : "逆ギレゲージ", W/2, gy - 5);
  ctx.textAlign = "left";
}

function drawTitle(){
  drawBG();
  ctx.fillStyle = "#2b1a22";
  ctx.textAlign = "center";
  ctx.font = 'bold 44px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillText("いいわけアイロン", W/2, 130);
  ctx.font = 'bold 17px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillText("〜でもでもだってちゃんの逆ギレラン〜", W/2, 165);

  if (imgStand.complete && imgStand.naturalWidth > 0){
    ctx.drawImage(imgStand, W/2 - 110, 220, 220, 224);
  }

  ctx.font = 'bold 15px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillStyle = "#4a2a38";
  const lines = [
    "タップで「チッ」→ 言い訳をジュッと焼く",
    "コンボ" + RAGE_NEED + "で 逆ギレモード発動!!",
    "⚠ 白い【正論】は焼くな! スルーしろ!",
    "(逆ギレ中だけは正論も焼ける)",
  ];
  lines.forEach((l, i) => ctx.fillText(l, W/2, 500 + i * 26));

  ctx.font = 'bold 22px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillStyle = "#fff";
  const blink = Math.floor(performance.now() / 500) % 2 === 0;
  if (blink) ctx.fillText("タップでスタート", W/2, 650);
  if (bestScore > 0){
    ctx.font = 'bold 14px "Hiragino Maru Gothic ProN",sans-serif';
    ctx.fillStyle = "#3a2530";
    ctx.fillText("ベスト: " + bestScore + " pt", W/2, 685);
  }
  ctx.textAlign = "left";
}

function drawOver(){
  ctx.fillStyle = "rgba(60,20,35,0.72)";
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = "center";
  ctx.fillStyle = "#fff";
  ctx.font = 'bold 40px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillText(deathBySeiron ? "正論には勝てなかった…" : "だって…だってぇ…", W/2, 250);
  ctx.font = 'bold 24px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillText("スコア: " + score + " pt", W/2, 330);
  ctx.font = 'bold 18px "Hiragino Maru Gothic ProN",sans-serif';
  ctx.fillText("今日焼いた言い訳: " + burned + "枚", W/2, 368);
  ctx.fillText("最大コンボ: " + maxCombo, W/2, 398);
  if (score >= bestScore && score > 0) ctx.fillText("★ ベスト更新!! ★", W/2, 436);
  const blink = Math.floor(performance.now() / 500) % 2 === 0;
  if (blink){
    ctx.font = 'bold 20px "Hiragino Maru Gothic ProN",sans-serif';
    ctx.fillText("タップでもう一回", W/2, 520);
  }
  ctx.textAlign = "left";
}

// ================= メインループ =================
function loop(ts){
  const dt = Math.min(0.05, (ts - lastTime) / 1000 || 0);
  lastTime = ts;
  update(dt);

  ctx.save();
  if (shakeT > 0){
    ctx.translate((Math.random()*2-1) * 6 * shakeT * 3, (Math.random()*2-1) * 6 * shakeT * 3);
  }
  if (state === "title"){
    drawTitle();
  } else {
    drawBG();
    for (const e of enemies) drawBubbleEnemy(e);
    drawCat();
    drawSteam();
    drawFloaters();
    drawHUD();
    if (state === "over") drawOver();
  }
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ================= 入力 =================
let overCooldown = 0;
function onTap(ev){
  if (ev) ev.preventDefault();
  audioUnlock();
  if (state === "title"){
    newGame();
  } else if (state === "play"){
    doAttack();
  } else if (state === "over"){
    // 死亡直後の連打で即リスタートしないように少し待つ
    if (performance.now() - overCooldown > 600) newGame();
  }
}
cv.addEventListener("touchstart", onTap, { passive:false });
cv.addEventListener("mousedown", (e) => {
  // タッチ端末でのダブル発火防止
  if (!("ontouchstart" in window)) onTap(e);
});
window.addEventListener("keydown", (e) => {
  if (e.code === "Space"){ e.preventDefault(); onTap(); }
});
// game over時刻を記録
const _origGameOver = gameOver;
gameOver = function(){ _origGameOver(); overCooldown = performance.now(); };
</script>
